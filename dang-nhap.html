<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - NhaTroSV</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- jQuery -->
    <script src="js/jquery-4.0.0.min.js"></script>
    
    <!-- JS -->
    <script src="js/main.js"></script>
    <script src="js/data.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="dau-trang">
        <div class="khung-chua">
            <nav class="thanh-dieu-huong">
                <a href="index.html" class="logo">
                    <i class="fas fa-building"></i>
                    <span class="chu-chuyen-sac">NhaTroSV</span>
                </a>
                
                <ul class="menu">
                    <li><a href="index.html" class="menu__link">Trang chủ</a></li>
                    <li><a href="ban-do.html" class="menu__link">Bản đồ</a></li>
                    <li><a href="tim-kiem.html" class="menu__link">Tìm kiếm</a></li>
                    <li><a href="yeu-thich.html" class="menu__link">Yêu thích</a></li>
                </ul>
                
                <div class="hanh-dong">
                    <a href="chu-tro.html" class="btn btn--landlord">
                        <i class="fas fa-building"></i> Cho chủ trọ
                    </a>
                    <a href="dang-nhap.html" class="btn btn--login">
                        <i class="fas fa-user"></i> Đăng nhập
                    </a>
                </div>
                
                <button class="nut-menu">
                    <i class="fas fa-bars"></i>
                </button>
            </nav>
        </div>
    </header>

    <!-- Vùng Đăng Nhập/Đăng Ký -->
    <main class="vung-dang-nhap">
        <!-- Logo giữa -->
        <div class="logo-giua">
            <div class="khung-logo">
                <i class="fa-solid fa-building-user"></i>
            </div>
            <h2>NhaTroSV</h2>
        </div>

        <!-- Form Đăng Nhập -->
        <div class="the-form active" id="form-dang-nhap">
            <h3>Đăng nhập</h3>
            <p class="mo-ta-form">Chào mừng trở lại! Đăng nhập để tiếp tục</p>

            <form>
                <div class="nhom-input">
                    <label>Email</label>
                    <div class="bao-input">
                        <i class="fa-regular fa-envelope icon-input"></i>
                        <input type="email" placeholder="your@email.com" required>
                    </div>
                </div>

                <div class="nhom-input">
                    <label>Mật khẩu</label>
                    <div class="bao-input">
                        <i class="fa-solid fa-lock icon-input"></i>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="nut-bam-chinh">Đăng nhập</button>
            </form>

            <div class="duong-phan-cach"><span>Hoặc tiếp tục với</span></div>
            
            <p class="chuyen-dong">Chưa có tài khoản? <a href="#" id="sang-dang-ky">Đăng ký ngay</a></p>
        </div>

        <!-- Form Đăng Ký -->
        <div class="the-form" id="form-dang-ky">
            <h3>Đăng ký tài khoản</h3>
            <p class="mo-ta-form">Tạo tài khoản mới để bắt đầu tìm trọ</p>

            <form>
                <div class="nhom-input">
                    <label>Họ và tên</label>
                    <div class="bao-input">
                        <i class="fa-regular fa-user icon-input"></i>
                        <input type="text" placeholder="Nguyễn Văn A" required>
                    </div>
                </div>

                <div class="nhom-input">
                    <label>Email</label>
                    <div class="bao-input">
                        <i class="fa-regular fa-envelope icon-input"></i>
                        <input type="email" placeholder="your@email.com" required>
                    </div>
                </div>

                <div class="nhom-input">
                    <label>Số điện thoại</label>
                    <div class="bao-input">
                        <i class="fa-solid fa-phone icon-input"></i>
                        <input type="tel" placeholder="0901234567" required>
                    </div>
                </div>

                <div class="nhom-input">
                    <label>Mật khẩu</label>
                    <div class="bao-input">
                        <i class="fa-solid fa-lock icon-input"></i>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="nut-bam-chinh">Đăng ký</button>
            </form>
            
            <p class="chuyen-dong">Đã có tài khoản? <a href="#" id="sang-dang-nhap">Đăng nhập</a></p>
        </div>
    </main>
</body>
</html>
